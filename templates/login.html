<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EnviroAir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <style> body { font-family: 'DM Sans', system-ui, sans-serif; } </style>
</head>
<body class="min-h-screen flex bg-slate-950 text-slate-100 antialiased">
    <div class="hidden lg:flex lg:w-1/2 relative">
        <img src="https://images.unsplash.com/photo-1611273426858-450d8e3c9fce?auto=format&fit=crop&w=1920&q=80" alt="" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-b from-slate-950/40 to-slate-950"></div>
        <div class="relative z-10 flex flex-col justify-end p-12 max-w-md">
            <h2 class="text-3xl font-bold text-white mb-2">Breathe smarter</h2>
            <p class="text-slate-300 text-sm leading-relaxed">Photo via Unsplash. Sign in to access predictions, uploads, and analytics.</p>
        </div>
    </div>
    <div class="flex-1 flex items-center justify-center p-6 sm:p-10">
        <div class="w-full max-w-md">
            <a href="{{ url_for('signup') }}" class="text-sm text-teal-400 hover:text-teal-300 mb-8 inline-block">← Create account</a>
            <h1 class="text-3xl font-bold text-white mb-2">Welcome back</h1>
            <p class="text-slate-400 text-sm mb-8">Sign in to continue to EnviroAir.</p>
            <form action="{{ url_for('log') }}" method="post" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm text-slate-400 mb-1">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 text-white placeholder-slate-500 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition">
                </div>
                <div>
                    <label for="password" class="block text-sm text-slate-400 mb-1">Password</label>
                    <input type="password" name="password" id="password" required autocomplete="current-password" class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 text-white placeholder-slate-500 focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none transition">
                </div>
                <button type="submit" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-semibold py-3 rounded-xl shadow-lg shadow-teal-900/30 transition">Login</button>
            </form>
            <p class="mt-6 text-center text-slate-500 text-sm">No account? <a href="{{ url_for('signup') }}" class="text-teal-400 hover:text-teal-300 font-medium">Sign up</a></p>
        </div>
    </div>
    {% if msg %}
    <script>alert({{ msg|tojson }});</script>
    {% endif %}
</body>
</html>
