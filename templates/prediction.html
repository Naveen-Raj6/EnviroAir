<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction — EnviroAir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'DM Sans', system-ui, sans-serif; } </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased">
    {% include 'nav.html' %}
    <div class="max-w-3xl mx-auto px-4 py-10">
        <div class="rounded-2xl overflow-hidden border border-slate-800 mb-10 h-40 sm:h-48">
            <img src="https://images.unsplash.com/photo-1611273426858-450d8e3c9fce?auto=format&fit=crop&w=1200&q=80" alt="" class="w-full h-full object-cover opacity-80">
        </div>
        <h1 class="text-3xl font-bold text-white mb-2 text-center">Air quality prediction</h1>
        <p class="text-slate-400 text-center text-sm mb-10">Enter pollutant values (Unsplash hero image above).</p>

        <form action="{{ url_for('predict') }}" method="POST" class="bg-slate-900/80 border border-slate-700 rounded-2xl p-6 sm:p-8 space-y-4">
            <div class="grid sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">PM2.5</label>
                    <input type="number" step="any" name="pm2" placeholder="PM2.5" required class="w-full rounded-lg bg-slate-800 border border-slate-600 px-3 py-2 text-white focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">PM10</label>
                    <input type="number" step="any" name="pm1" placeholder="PM10" required class="w-full rounded-lg bg-slate-800 border border-slate-600 px-3 py-2 text-white focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">NO₂</label>
                    <input type="number" name="no2" step="any" placeholder="NO2" required class="w-full rounded-lg bg-slate-800 border border-slate-600 px-3 py-2 text-white focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">CO</label>
                    <input type="number" step="any" name="co" placeholder="CO" required class="w-full rounded-lg bg-slate-800 border border-slate-600 px-3 py-2 text-white focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">SO₂</label>
                    <input type="number" name="so2" step="any" placeholder="SO2" required class="w-full rounded-lg bg-slate-800 border border-slate-600 px-3 py-2 text-white focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">O₃</label>
                    <input type="number" name="o3" step="any" placeholder="O3" required class="w-full rounded-lg bg-slate-800 border border-slate-600 px-3 py-2 text-white focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
            </div>
            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-semibold py-3 rounded-xl transition">Predict</button>
        </form>

        {% if prediction_text is not none %}
        <div class="mt-10 text-center p-6 rounded-2xl bg-teal-950/50 border border-teal-800/50">
            <p class="text-slate-400 text-sm uppercase tracking-wide mb-1">Result</p>
            <p class="text-2xl sm:text-3xl font-bold text-teal-400">{{ prediction_text }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
