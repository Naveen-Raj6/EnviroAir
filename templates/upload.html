<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload CSV — EnviroAir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'DM Sans', system-ui, sans-serif; } </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased">
    {% include 'nav.html' %}
    <div class="relative py-16 px-4 overflow-hidden">
        <div class="absolute inset-0 opacity-30">
            <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=1920&q=80" alt="" class="w-full h-full object-cover">
        </div>
        <div class="relative max-w-lg mx-auto">
            <div class="bg-slate-900/90 backdrop-blur border border-slate-700 rounded-2xl p-8 shadow-2xl">
                <h1 class="text-2xl font-bold text-white mb-2">Upload dataset</h1>
                <p class="text-slate-400 text-sm mb-6">CSV file preview — same format as your training data.</p>
                <form action="{{ url_for('getdata') }}" method="post" enctype="multipart/form-data" class="space-y-6">
                    <div>
                        <label class="block text-sm text-slate-400 mb-2">Choose file</label>
                        <input type="file" name="data" required accept=".csv" class="block w-full text-sm text-slate-300 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-teal-600 file:text-white hover:file:bg-teal-500 cursor-pointer">
                    </div>
                    <button type="submit" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-semibold py-3 rounded-xl transition">Upload &amp; preview</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
