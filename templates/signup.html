<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up — EnviroAir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
    <style> body { font-family: 'DM Sans', system-ui, sans-serif; } </style>
</head>
<body class="min-h-screen flex flex-col lg:flex-row bg-slate-950 text-slate-100 antialiased">
    <div class="lg:w-1/2 min-h-[40vh] lg:min-h-screen relative">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1920&q=80" alt="" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 bg-gradient-to-r from-slate-950/90 to-slate-950/40"></div>
        <div class="relative z-10 p-10 lg:p-14 flex flex-col justify-end h-full min-h-[40vh] lg:min-h-screen">
            <h2 class="text-2xl lg:text-3xl font-bold text-white mb-2">Join EnviroAir</h2>
            <p class="text-slate-300 text-sm max-w-sm">Background image via Unsplash. After registering, sign in to use the app.</p>
        </div>
    </div>
    <div class="flex-1 flex items-center justify-center p-6 sm:p-10">
        <div class="w-full max-w-md">
            <a href="{{ url_for('login') }}" class="text-sm text-teal-400 hover:text-teal-300 mb-6 inline-block">← Back to login</a>
            <h1 class="text-3xl font-bold text-white mb-2">Create account</h1>
            <p class="text-slate-400 text-sm mb-8">Use the same credentials you configured in MySQL.</p>
            <form action="{{ url_for('insertvalues') }}" method="post" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm text-slate-400 mb-1">Username</label>
                    <input type="text" name="username" id="username" required autocomplete="username" class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 text-white focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                <div>
                    <label for="email" class="block text-sm text-slate-400 mb-1">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email" class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 text-white focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                <div>
                    <label for="password" class="block text-sm text-slate-400 mb-1">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password" class="w-full rounded-xl bg-slate-900 border border-slate-700 px-4 py-3 text-white focus:ring-2 focus:ring-teal-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-semibold py-3 rounded-xl transition mt-2">Sign up</button>
            </form>
            <p class="mt-6 text-center text-slate-500 text-sm">Already have an account? <a href="{{ url_for('login') }}" class="text-teal-400 hover:text-teal-300 font-medium">Login</a></p>
        </div>
    </div>
    {% if msg %}
    <script>alert({{ msg|tojson }});</script>
    {% endif %}
</body>
</html>
